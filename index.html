<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WOD Timer - 스마일 크로스핏</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Han+Sans&family=JetBrains+Mono:wght@700;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;
  --accent:#00ff88;
  --prep:#ffb400;
  --count:#ff2d55;
  --work:#00ff88;
  --rest:#00b4ff;
  --urgent:#ff2d55;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Noto Sans KR',sans-serif}
html{height:-webkit-fill-available}
body{
  min-height:100vh;
  min-height:-webkit-fill-available;
  display:flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  touch-action:manipulation;
  position:fixed;top:0;left:0;right:0;bottom:0;
}

.stage{
  width:1920px;height:1080px;
  position:relative;
  background:var(--bg);
  transform-origin:center center;
  overflow:hidden;
  transition:background 0.8s ease;
  flex-shrink:0;
}

.rotate-prompt{
  display:none;
  position:fixed;inset:0;
  background:#0a0e1a;z-index:9999;
  flex-direction:column;align-items:center;justify-content:center;
  color:#fff;text-align:center;padding:40px;
  font-family:'Noto Sans KR',sans-serif;
}
.rotate-prompt .icon{
  font-size:100px;margin-bottom:30px;
  animation:rotateHint 2s ease-in-out infinite;
}
@keyframes rotateHint{
  0%,100%{transform:rotate(0deg)}
  50%{transform:rotate(90deg)}
}
.rotate-prompt h2{
  font-family:'Black Han Sans',sans-serif;
  font-size:36px;color:#00ff88;margin-bottom:15px;
}
.rotate-prompt p{font-size:18px;color:rgba(255,255,255,0.8);line-height:1.6}
@media (max-width:1024px) and (orientation:portrait){
  .rotate-prompt{display:flex}
  .stage{display:none}
}

.stage.prep{background:linear-gradient(135deg,#2a1f00,#0a0e1a)}
.stage.count{background:linear-gradient(135deg,#2a0008,#0a0e1a)}
.stage.work{background:linear-gradient(135deg,#001f12,#0a0e1a)}
.stage.work.urgent{background:linear-gradient(135deg,#2a0008,#0a0e1a)}
.stage.rest{background:linear-gradient(135deg,#001628,#0a0e1a)}
.stage.done{background:linear-gradient(135deg,#0a0e1a,#001f12)}

.stage::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:80px 80px;
  pointer-events:none;
}

/* ===== TOP BAR ===== */
.top{
  position:absolute;top:0;left:0;right:0;height:110px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 70px;
  border-bottom:2px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
  z-index:10;
}
.round-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:68px;letter-spacing:5px;
  display:flex;align-items:center;line-height:1;
}
.round-label .num{color:var(--accent);margin:0 12px}
.round-dots{display:flex;gap:18px;margin-left:36px}
.dot{
  width:26px;height:26px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.25);
  transition:all 0.4s;
}
.dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 25px var(--accent)}
.dot.done{background:rgba(255,255,255,0.35);border-color:rgba(255,255,255,0.35)}

.total-time{
  font-family:'JetBrains Mono',monospace;
  font-size:46px;font-weight:800;
  letter-spacing:2px;
}
.total-time .elapsed{color:var(--accent)}
.total-time .sep{opacity:0.4;margin:0 12px}

/* ===== AUDIO CONTROLS (top right) ===== */
.audio-controls{
  position:absolute;top:130px;right:30px;
  display:flex;gap:12px;
  z-index:20;
}
.audio-btn{
  width:60px;height:60px;border-radius:50%;
  background:rgba(0,0,0,0.5);
  border:2px solid rgba(255,255,255,0.2);
  color:#fff;
  font-size:28px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);
  transition:all 0.2s;
}
.audio-btn:hover{background:rgba(0,255,136,0.3);border-color:var(--accent)}
.audio-btn.muted{opacity:0.5}

/* ===== MAIN ===== */
.main{
  position:absolute;top:110px;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  padding:30px 60px;gap:50px;
}

.round-structure{
  width:620px;
  display:flex;flex-direction:column;gap:28px;
}
.struct-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;letter-spacing:8px;
  color:rgba(255,255,255,0.5);
  margin-bottom:8px;
}
.step{
  padding:36px 40px;
  background:rgba(0,255,136,0.08);
  border:3px solid rgba(0,255,136,0.4);
  border-radius:24px;
  display:flex;gap:28px;align-items:center;
  transition:all 0.5s;
  box-shadow:0 0 30px rgba(0,255,136,0.15);
}
.step.dim{
  background:rgba(255,255,255,0.03);
  border-color:rgba(255,255,255,0.1);
  box-shadow:none;
  opacity:0.4;
}
.step-icon{
  width:90px;height:90px;border-radius:50%;
  background:var(--accent);
  color:#000;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;
  font-size:54px;
  flex-shrink:0;
  transition:all 0.3s;
  line-height:1;
}
.step.dim .step-icon{background:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5)}
.step-content{flex:1;min-width:0}
.step-title{
  font-family:'Black Han Sans',sans-serif;
  font-size:56px;
  line-height:1.05;
  color:#fff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.step-title.smaller{font-size:42px}
.step-title.smallest{font-size:34px}
.step-sub{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  letter-spacing:4px;
  color:var(--accent);
  margin-top:6px;
}
.step.dim .step-sub{color:rgba(255,255,255,0.4)}

.timer-wrap{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
}
.state-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:68px;letter-spacing:14px;
  color:rgba(255,255,255,0.85);
  margin-bottom:20px;
  line-height:1;
  transition:color 0.4s;
}
.stage.prep .state-label{color:var(--prep)}
.stage.count .state-label{color:var(--count)}
.stage.work .state-label{color:var(--work)}
.stage.work.urgent .state-label{color:var(--urgent)}
.stage.rest .state-label{color:var(--rest)}

.timer-ring{
  width:760px;height:760px;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.timer-ring svg{
  position:absolute;inset:0;
  transform:rotate(-90deg);
}
.timer-ring svg .bg-ring{
  fill:none;stroke:rgba(255,255,255,0.08);stroke-width:10;
}
.timer-ring svg .progress-ring{
  fill:none;stroke:var(--accent);stroke-width:12;
  stroke-linecap:round;
  filter:drop-shadow(0 0 25px var(--accent));
  transition:stroke-dashoffset 0.95s linear,stroke 0.5s;
}
.stage.prep .progress-ring{stroke:var(--prep);filter:drop-shadow(0 0 25px var(--prep))}
.stage.count .progress-ring{stroke:var(--count);filter:drop-shadow(0 0 30px var(--count))}
.stage.work .progress-ring{stroke:var(--work);filter:drop-shadow(0 0 25px var(--work))}
.stage.work.urgent .progress-ring{stroke:var(--urgent);filter:drop-shadow(0 0 30px var(--urgent))}
.stage.rest .progress-ring{stroke:var(--rest);filter:drop-shadow(0 0 25px var(--rest))}

.timer-num{
  font-family:'Bebas Neue',sans-serif;
  font-weight:400;
  font-size:340px;
  line-height:1;
  letter-spacing:0px;
  color:#fff;
  text-shadow:0 0 50px rgba(0,255,136,0.4);
  position:relative;
  z-index:2;
}
.stage.work.urgent .timer-num{color:var(--urgent);text-shadow:0 0 60px var(--urgent)}
.timer-num.big{
  font-size:420px;
  color:var(--count);
  text-shadow:0 0 70px var(--count);
  animation:countBeat 1s ease-out;
}
@keyframes countBeat{
  0%{transform:scale(1.4);opacity:0.3}
  50%{transform:scale(1.1);opacity:1}
  100%{transform:scale(1);opacity:1}
}
.timer-sub{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;letter-spacing:10px;
  color:rgba(255,255,255,0.5);
  margin-top:-10px;
}

.start-screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0a0e1a,#001f12);
  z-index:100;
  gap:30px;
}
.start-title{
  font-family:'Black Han Sans',sans-serif;
  font-size:160px;
  color:#fff;
  line-height:1;
  letter-spacing:2px;
}
.start-title .accent{color:var(--accent);text-shadow:0 0 50px var(--accent)}
.start-sub-en{
  font-family:'Bebas Neue',sans-serif;
  font-size:60px;letter-spacing:14px;
  color:var(--accent);
  margin-top:-10px;
}
.start-sub{
  font-family:'Black Han Sans',sans-serif;
  font-size:40px;color:rgba(255,255,255,0.7);
  letter-spacing:4px;
}
.start-btn{
  padding:30px 100px;
  font-size:44px;font-weight:900;
  background:var(--accent);color:#000;
  border:none;border-radius:60px;
  cursor:pointer;
  letter-spacing:4px;
  font-family:'Black Han Sans',sans-serif;
  box-shadow:0 0 50px var(--accent);
  transition:transform 0.2s;
  margin-top:40px;
}
.start-btn:hover{transform:scale(1.05)}
.start-info{display:flex;gap:60px;margin-top:20px}
.start-info div{text-align:center;font-family:'Bebas Neue',sans-serif}
.start-info .v{font-size:84px;font-weight:400;color:var(--accent);line-height:1}
.start-info .k{font-size:24px;color:rgba(255,255,255,0.5);letter-spacing:4px;margin-top:5px}

.start-options{
  display:flex;gap:30px;margin-top:10px;
  font-family:'Noto Sans KR',sans-serif;
}
.start-options label{
  display:flex;align-items:center;gap:12px;
  font-size:22px;color:rgba(255,255,255,0.8);
  cursor:pointer;
  padding:12px 24px;
  background:rgba(0,0,0,0.3);
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  transition:all 0.2s;
}
.start-options label:hover{border-color:var(--accent);color:#fff}
.start-options input[type=checkbox]{
  width:22px;height:22px;accent-color:var(--accent);cursor:pointer;
}

.done-screen{
  position:absolute;inset:0;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:50;
  background:radial-gradient(circle at center,rgba(0,255,136,0.2),transparent 60%);
}
.done-screen.show{display:flex;animation:fadeIn 1s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.done-screen h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:260px;letter-spacing:22px;
  color:var(--accent);
  text-shadow:0 0 80px var(--accent);
  line-height:1;
}
.done-screen .ko-title{
  font-family:'Black Han Sans',sans-serif;
  font-size:80px;color:#fff;margin-top:20px;letter-spacing:6px;
}
.done-screen p{
  font-family:'Black Han Sans',sans-serif;
  font-size:40px;color:rgba(255,255,255,0.7);margin-top:20px;letter-spacing:4px;
}

.flash{
  position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:200;
}
.flash.on{animation:flashAnim 0.4s ease-out}
@keyframes flashAnim{
  0%{opacity:0.7}
  100%{opacity:0}
}
</style>
</head>
<body>
<div class="rotate-prompt">
  <div class="icon">📱</div>
  <h2>가로 모드로 돌려주세요</h2>
  <p>이 영상은 가로 화면으로 최적화되어 있어요.<br>
  핸드폰을 옆으로 돌리고<br>
  자동회전을 켜주세요.</p>
</div>

<div class="stage" id="stage">

  <div class="start-screen" id="startScreen">
    <div class="start-title">오늘의 <span class="accent">WOD</span></div>
    <div class="start-sub-en">WORKOUT OF THE DAY</div>
    <div class="start-sub">2분 운동 · 1분 휴식 · 4라운드</div>
    <div class="start-info">
      <div><div class="v">4</div><div class="k">ROUNDS</div></div>
      <div><div class="v">2:00</div><div class="k">WORK</div></div>
      <div><div class="v">1:00</div><div class="k">REST</div></div>
      <div><div class="v">11</div><div class="k">MIN</div></div>
    </div>
    <div class="start-options">
      <label>
        <input type="checkbox" id="voiceCheck" checked>
        🎙️ 음성 안내
      </label>
      <label>
        <input type="checkbox" id="musicCheck" checked>
        🎵 배경음악
      </label>
      <label>
        <input type="checkbox" id="beepCheck" checked>
        🔔 비프음
      </label>
    </div>
    <button class="start-btn" onclick="startWorkout()">START ▶</button>
  </div>

  <div class="top">
    <div style="display:flex;align-items:center">
      <div class="round-label">ROUND <span class="num" id="roundNum">1</span> / 4</div>
      <div class="round-dots" id="roundDots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div class="total-time">
      <span class="elapsed" id="totalElapsed">00:00</span>
      <span class="sep">/</span>
      <span id="totalDuration">11:00</span>
    </div>
  </div>

  <!-- Audio controls (visible during workout) -->
  <div class="audio-controls" id="audioControls" style="display:none">
    <button class="audio-btn" id="muteBtn" onclick="toggleMuteAll()" title="전체 음소거">🔊</button>
    <button class="audio-btn" id="musicBtn" onclick="toggleMusic()" title="배경음악 토글">🎵</button>
  </div>

  <div class="main">
    <div class="round-structure">
      <div class="struct-label">ROUND STRUCTURE</div>
      <div class="step" id="step1">
        <div class="step-icon">1</div>
        <div class="step-content">
          <div class="step-title" id="step1Title">줄넘기 80개</div>
          <div class="step-sub">JUMP ROPE</div>
        </div>
      </div>
      <div class="step" id="step2">
        <div class="step-icon">2</div>
        <div class="step-content">
          <div class="step-title" id="step2Title">남은시간: 왕복달리기</div>
          <div class="step-sub" id="step2Sub">SHUTTLE RUN</div>
        </div>
      </div>
    </div>

    <div class="timer-wrap">
      <div class="state-label" id="stateLabel">PREPARE</div>
      <div class="timer-ring">
        <svg viewBox="0 0 760 760">
          <circle class="bg-ring" cx="380" cy="380" r="366"/>
          <circle class="progress-ring" id="progressRing" cx="380" cy="380" r="366"
            stroke-dasharray="2299" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-num" id="timerNum">20</div>
      </div>
      <div class="timer-sub" id="timerSub">SECONDS</div>
    </div>
  </div>

  <div class="done-screen" id="doneScreen">
    <h1>WELL DONE!</h1>
    <div class="ko-title">오늘의 WOD 완료</div>
    <p>수고하셨습니다 💪</p>
  </div>

  <div class="flash" id="flash"></div>
</div>

<!-- Background music playlist -->
<!-- Add your mp3 files in the audio/ folder as bgm1.mp3, bgm2.mp3, etc. -->
<!-- Any tracks not found will be skipped silently -->
<audio id="bgMusic" preload="auto"></audio>

<script>
/* ========== RESPONSIVE SCALING ========== */
function updateStageScale(){
  const stage = document.getElementById('stage');
  if(!stage) return;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / 1920, vh / 1080);
  stage.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', updateStageScale);
window.addEventListener('orientationchange', () => setTimeout(updateStageScale, 200));
document.addEventListener('DOMContentLoaded', updateStageScale);
window.addEventListener('load', updateStageScale);

/* ========== CONFIG ========== */
const rounds = [
  {jumpRope:80, exercise:'왕복달리기', exerciseEn:'SHUTTLE RUN'},
  {jumpRope:70, exercise:'런지',       exerciseEn:'LUNGES'},
  {jumpRope:60, exercise:'팔굽혀펴기',   exerciseEn:'PUSH-UPS'},
  {jumpRope:50, exercise:'브이싯 농구공 트위스트', exerciseEn:'V-SIT BALL TWIST'},
];

const TOTAL_DURATION = 11 * 60;

/* ========== AUDIO ========== */
let audioCtx = null;
let bgMusic = null;
let enableVoice = true;
let enableMusic = true;
let enableBeep = true;
let allMuted = false;

/* ===== PLAYLIST =====
   audio/ 폴더에 bgm1.mp3, bgm2.mp3, bgm3.mp3 ... 순서대로 넣으면
   자동으로 순서대로 재생됩니다.
   원하는 만큼 넣어도 됩니다 (1개 ~ 20개까지 자동 탐색).
*/
const MAX_TRACKS = 20;
let playlistTracks = [];
for(let i = 1; i <= MAX_TRACKS; i++){
  playlistTracks.push(`audio/bgm${i}.mp3`);
}
let currentTrackIndex = 0;

function initAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)() }catch(e){}
  }
  bgMusic = document.getElementById('bgMusic');
  if(bgMusic){
    bgMusic.volume = 0.25;
    // When track ends, play next in playlist
    bgMusic.addEventListener('ended', () => {
      if(!enableMusic || allMuted) return;
      playNextTrack();
    });
    // On error (file missing), try next - if all fail eventually loop
    bgMusic.addEventListener('error', () => {
      playNextTrack(true);
    });
  }
}

let errorAttempts = 0;
async function playNextTrack(fromError=false){
  if(!bgMusic || !enableMusic || allMuted) return;

  if(fromError){
    errorAttempts++;
    // If we've tried all tracks and they all failed, give up silently
    if(errorAttempts >= MAX_TRACKS){
      errorAttempts = 0;
      return;
    }
  } else {
    errorAttempts = 0;
  }

  currentTrackIndex = (currentTrackIndex + 1) % playlistTracks.length;
  bgMusic.src = playlistTracks[currentTrackIndex];
  try{ await bgMusic.play() }catch(e){}
}

async function startPlaylist(){
  if(!bgMusic || !enableMusic || allMuted) return;
  currentTrackIndex = 0;
  errorAttempts = 0;
  bgMusic.src = playlistTracks[0];
  try{ await bgMusic.play() }catch(e){ console.log('Playlist start failed:', e) }
}

function beep(freq=880, dur=0.15, type='sine', vol=0.4){
  if(!enableBeep || allMuted || !audioCtx) return;
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
function longBeep(){ beep(1200, 0.6, 'sine', 0.5) }

/* ========== VOICE (MP3 files from Clova Dubbing) ========== */
const voiceFiles = {
  countdown:     'audio/voice/countdown.mp3',
  jumpStart:     'audio/voice/jump_start.mp3',
  time90:        'audio/voice/time_90.mp3',
  time60:        'audio/voice/time_60.mp3',
  time30:        'audio/voice/time_30.mp3',
  final5:        'audio/voice/final5.mp3',
  round1Intro:   'audio/voice/round1_intro.mp3',
  round2Intro:   'audio/voice/round2_intro.mp3',
  round3Intro:   'audio/voice/round3_intro.mp3',
  round4Intro:   'audio/voice/round4_intro.mp3',
  round1Record:  'audio/voice/round1_record.mp3',
  round2Record:  'audio/voice/round2_record.mp3',
  round3Record:  'audio/voice/round3_record.mp3',
  round4Record:  'audio/voice/round4_record.mp3',
  done:          'audio/voice/done.mp3',
};

// Preloaded Audio elements (for fast playback on mobile)
const voiceAudio = {};
let currentVoice = null;

function preloadVoices(){
  for(const [key, src] of Object.entries(voiceFiles)){
    const a = new Audio(src);
    a.preload = 'auto';
    a.volume = 1.0;
    voiceAudio[key] = a;
  }
}

// Play a voice file and return a Promise that resolves when it ends
function playVoice(key){
  return new Promise(resolve => {
    if(!enableVoice || allMuted){ resolve(); return; }
    const audio = voiceAudio[key];
    if(!audio){ resolve(); return; }

    // Stop any currently playing voice
    if(currentVoice && !currentVoice.paused){
      try{ currentVoice.pause() }catch(e){}
    }
    currentVoice = audio;
    audio.currentTime = 0;

    const onEnd = () => {
      audio.removeEventListener('ended', onEnd);
      audio.removeEventListener('error', onEnd);
      resolve();
    };
    audio.addEventListener('ended', onEnd);
    audio.addEventListener('error', onEnd);

    const p = audio.play();
    if(p && p.catch){
      p.catch(err => {
        console.log('Voice play failed:', key, err);
        resolve();
      });
    }
  });
}

// Fire-and-forget voice (doesn't wait)
function playVoiceNoWait(key){
  if(!enableVoice || allMuted) return;
  const audio = voiceAudio[key];
  if(!audio) return;
  if(currentVoice && !currentVoice.paused){
    try{ currentVoice.pause() }catch(e){}
  }
  currentVoice = audio;
  audio.currentTime = 0;
  const p = audio.play();
  if(p && p.catch){ p.catch(()=>{}) }
}

/* Music volume ducking while speaking */
function duckMusic(){
  if(bgMusic && !bgMusic.paused){
    bgMusic.volume = 0.06;
  }
}
function unduckMusic(){
  if(bgMusic && !bgMusic.paused){
    bgMusic.volume = 0.25;
  }
}

/* Audio control buttons */
function toggleMuteAll(){
  allMuted = !allMuted;
  const btn = document.getElementById('muteBtn');
  if(allMuted){
    btn.textContent = '🔇';
    btn.classList.add('muted');
    if(bgMusic) bgMusic.muted = true;
    if(currentVoice && !currentVoice.paused){ try{ currentVoice.pause() }catch(e){} }
  }else{
    btn.textContent = '🔊';
    btn.classList.remove('muted');
    if(bgMusic) bgMusic.muted = false;
  }
}
function toggleMusic(){
  enableMusic = !enableMusic;
  const btn = document.getElementById('musicBtn');
  if(!enableMusic){
    btn.classList.add('muted');
    if(bgMusic) bgMusic.pause();
  }else{
    btn.classList.remove('muted');
    if(bgMusic){
      if(bgMusic.src){
        bgMusic.play().catch(()=>{});
      }else{
        startPlaylist();
      }
    }
  }
}
window.toggleMuteAll = toggleMuteAll;
window.toggleMusic = toggleMusic;

/* ========== UTILS ========== */
function fmt(s){
  const m = Math.floor(s/60), r = s%60;
  return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`;
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function setStage(cls){
  document.getElementById('stage').className = 'stage ' + cls;
}
function setState(txt){ document.getElementById('stateLabel').textContent = txt }
function setTimer(n, big=false){
  const t = document.getElementById('timerNum');
  t.textContent = n;
  t.className = 'timer-num' + (big ? ' big' : '');
}
function setTimerSub(txt){ document.getElementById('timerSub').textContent = txt }
function setProgress(pct){
  const ring = document.getElementById('progressRing');
  const dash = 2299;
  ring.style.strokeDashoffset = dash * (pct/100);
}

document.getElementById('totalDuration').textContent = fmt(TOTAL_DURATION);

let totalSec = 0;
let totalTimer = null;
let workoutStarted = false;

function updateRoundUI(roundIdx){
  document.getElementById('roundNum').textContent = roundIdx + 1;
  const dots = document.querySelectorAll('#roundDots .dot');
  dots.forEach((d,i) => {
    d.classList.remove('active','done');
    if(i < roundIdx) d.classList.add('done');
    else if(i === roundIdx) d.classList.add('active');
  });
  const r = rounds[roundIdx];
  const s1 = document.getElementById('step1Title');
  const s2 = document.getElementById('step2Title');
  s1.textContent = `줄넘기 ${r.jumpRope}개`;
  s2.textContent = `남은시간: ${r.exercise}`;
  document.getElementById('step2Sub').textContent = r.exerciseEn;

  s2.classList.remove('smaller','smallest');
  if(r.exercise.length >= 10) s2.classList.add('smallest');
  else if(r.exercise.length >= 5) s2.classList.add('smaller');

  showBothSteps();
}
function showBothSteps(){
  document.getElementById('step1').classList.remove('dim');
  document.getElementById('step2').classList.remove('dim');
}
function dimBothSteps(){
  document.getElementById('step1').classList.add('dim');
  document.getElementById('step2').classList.add('dim');
}

function startTotalTimer(){
  totalSec = 0;
  document.getElementById('totalElapsed').textContent = '00:00';
  totalTimer = setInterval(() => {
    totalSec++;
    if(totalSec <= TOTAL_DURATION){
      document.getElementById('totalElapsed').textContent = fmt(totalSec);
    }
  }, 1000);
}
function stopTotalTimer(){ clearInterval(totalTimer) }

function flash(){
  const f = document.getElementById('flash');
  f.classList.remove('on');
  void f.offsetWidth;
  f.classList.add('on');
}

/* ========== PHASE: PREP (20s, last 10s = countdown) ========== */
async function prepPhase(roundIdx){
  const r = rounds[roundIdx];
  setStage('prep');
  setState('PREPARE');
  setTimerSub('SECONDS');
  updateRoundUI(roundIdx);

  // Play intro voice
  duckMusic();
  playVoiceNoWait(`round${roundIdx+1}Intro`);

  // First 10 seconds (20 -> 11)
  for(let s = 20; s >= 11; s--){
    setTimer(s);
    setProgress(((20-s)/20)*100);
    await sleep(1000);
  }

  unduckMusic();

  // Last 10 seconds countdown
  setStage('count');
  setState('GET READY');
  setTimerSub('COUNTDOWN');

  // Play countdown voice (covers 10 seconds)
  duckMusic();
  playVoiceNoWait('countdown');

  for(let s = 10; s >= 1; s--){
    setTimer(s, true);
    setProgress(((20-s)/20)*100);
    // beep on 3,2,1
    if(s <= 3){ beep(1000, 0.15, 'square', 0.5) }
    else { beep(660, 0.08, 'sine', 0.25) }
    await sleep(1000);
  }
  unduckMusic();
}

/* ========== PHASE: WORK (2:00) ========== */
async function workPhase(roundIdx){
  setStage('work');
  setState('WORK');
  setTimerSub('ROUND TIMER');
  showBothSteps();

  duckMusic();
  await playVoice('jumpStart');
  unduckMusic();
  beep(1200, 0.4, 'sine', 0.5);

  for(let s = 120; s >= 1; s--){
    if(s <= 10){
      setStage('work urgent');
      setState('FINISH!');
    }
    setTimer(fmt(s));
    setProgress(((120-s)/120)*100);

    // checkpoints
    if(s === 90){ duckMusic(); playVoiceNoWait('time90'); setTimeout(unduckMusic, 2500) }
    if(s === 60){ duckMusic(); playVoiceNoWait('time60'); setTimeout(unduckMusic, 2000) }
    if(s === 30){ duckMusic(); playVoiceNoWait('time30'); setTimeout(unduckMusic, 2000) }

    // final 5 seconds countdown
    if(s === 5){
      duckMusic();
      playVoiceNoWait('final5');
      beep(800, 0.1, 'sine', 0.3);
    }
    if(s === 4){ beep(800, 0.1, 'sine', 0.3) }
    if(s === 3){ beep(1200, 0.15, 'square', 0.55) }
    if(s === 2){ beep(1200, 0.15, 'square', 0.55) }
    if(s === 1){ beep(1200, 0.15, 'square', 0.55) }

    await sleep(1000);
  }

  // 그만!
  setTimer('00:00');
  flash();
  longBeep();
  unduckMusic();
  await sleep(500);
}

/* ========== PHASE: REST (1:00) - includes prep for next round ========== */
async function restPhase(roundIdx){
  const r = rounds[roundIdx];
  const nextR = rounds[roundIdx+1];
  setStage('rest');
  setState('REST');
  setTimerSub('RECORD YOUR REPS');
  dimBothSteps();

  duckMusic();
  playVoiceNoWait(`round${roundIdx+1}Record`);
  setTimeout(unduckMusic, 3500);

  // First 40 seconds: rest (60 -> 21)
  for(let s = 60; s >= 21; s--){
    setTimer(fmt(s));
    setProgress(((60-s)/60)*100);
    await sleep(1000);
  }

  // Last 20 seconds: prep for next round
  setStage('prep');
  setState('GET READY');
  setTimerSub('NEXT ROUND');
  updateRoundUI(roundIdx + 1);

  duckMusic();
  playVoiceNoWait(`round${roundIdx+2}Intro`);

  // 20 -> 11
  for(let s = 20; s >= 11; s--){
    setTimer(s);
    setProgress(((60-s)/60)*100);
    await sleep(1000);
  }
  unduckMusic();

  // 10 -> 1 countdown
  setStage('count');
  setState('GET READY');
  setTimerSub('COUNTDOWN');

  duckMusic();
  playVoiceNoWait('countdown');

  for(let s = 10; s >= 1; s--){
    setTimer(s, true);
    setProgress(((60-s)/60)*100);
    if(s <= 3){ beep(1000, 0.15, 'square', 0.5) }
    else { beep(660, 0.08, 'sine', 0.25) }
    await sleep(1000);
  }
  unduckMusic();
}

/* ========== MAIN LOOP ========== */
async function startWorkout(){
  if(workoutStarted) return;
  workoutStarted = true;

  // Read settings
  enableVoice = document.getElementById('voiceCheck').checked;
  enableMusic = document.getElementById('musicCheck').checked;
  enableBeep  = document.getElementById('beepCheck').checked;

  initAudio();
  preloadVoices();

  // ========== MOBILE AUDIO UNLOCK (CRITICAL) ==========
  // iOS and some Android browsers require audio to be started from a user gesture.
  // We play a silent buffer on EVERY audio element to unlock them all at once.
  try{
    if(audioCtx && audioCtx.state === 'suspended'){
      await audioCtx.resume();
    }
  }catch(e){}

  // Unlock all voice audio elements with silent play
  const unlockPromises = [];
  for(const key in voiceAudio){
    const a = voiceAudio[key];
    try{
      a.muted = true;
      const p = a.play();
      if(p && p.then){
        unlockPromises.push(
          p.then(() => {
            a.pause();
            a.currentTime = 0;
            a.muted = false;
          }).catch(() => { a.muted = false; })
        );
      }
    }catch(e){}
  }
  // Unlock bg music too
  if(bgMusic){
    try{
      bgMusic.muted = true;
      const p = bgMusic.play();
      if(p && p.then){
        unlockPromises.push(
          p.then(() => {
            bgMusic.pause();
            bgMusic.currentTime = 0;
            bgMusic.muted = false;
          }).catch(() => { bgMusic.muted = false; })
        );
      }
    }catch(e){}
  }
  await Promise.all(unlockPromises).catch(()=>{});

  // Small delay to let everything settle
  await sleep(100);

  // Start background music playlist
  if(enableMusic){
    startPlaylist();
  }

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('audioControls').style.display = 'flex';
  updateStageScale();

  // Keep screen awake on mobile
  requestWakeLock();

  // Initial prep (not counted in 11:00)
  await prepPhase(0);

  // Start 11:00 workout timer
  startTotalTimer();

  for(let i = 0; i < rounds.length; i++){
    await workPhase(i);
    if(i < rounds.length - 1){
      await restPhase(i);
    } else {
      // Final round record
      setStage('rest');
      setState('FINISHED');
      setTimerSub('GREAT JOB!');
      dimBothSteps();
      duckMusic();
      playVoiceNoWait(`round4Record`);
      await sleep(4500);
      playVoiceNoWait('done');
      await sleep(4000);
      unduckMusic();
    }
  }

  // DONE
  stopTotalTimer();
  document.getElementById('totalElapsed').textContent = fmt(TOTAL_DURATION);
  setStage('done');
  document.getElementById('doneScreen').classList.add('show');
  flash();
  longBeep();
  releaseWakeLock();

  // Fade out music after 5 seconds
  setTimeout(() => {
    if(bgMusic){
      const fade = setInterval(() => {
        if(bgMusic.volume > 0.02){
          bgMusic.volume = Math.max(0, bgMusic.volume - 0.02);
        }else{
          bgMusic.pause();
          clearInterval(fade);
        }
      }, 100);
    }
  }, 5000);
}

// ========== WAKE LOCK (prevent screen sleep on mobile) ==========
let wakeLock = null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
    }
  }catch(e){ console.log('Wake lock failed:', e) }
}
function releaseWakeLock(){
  try{ if(wakeLock){ wakeLock.release(); wakeLock = null; } }catch(e){}
}
// Re-acquire wake lock when page becomes visible
document.addEventListener('visibilitychange', () => {
  if(wakeLock !== null && document.visibilityState === 'visible'){
    requestWakeLock();
  }
});

window.startWorkout = startWorkout;
</script>
